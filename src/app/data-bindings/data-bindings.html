<!-- ==================== Interpolation {{}}, [propertyBinding], (EventBinding) Example ========================= -->
<div class="border rounded mt-3 mb-3 p-2">
    <h3>Data Binding</h3>
    <input [value]="name" (input)="name = $any($event.target).value" placeholder="Type your name">
    <p>Hello {{ name }}!</p>
    <button (click)="count = count + 1">Clicked {{ count }} times</button>
    <button [disabled]="isDisabled">Can't click me</button>
</div>

<!-- ====================================== Two-way Binding (ngModel) ====================================== -->
<div class="border rounded mt-3 mb-3 p-2">
    <h3>Two-way Binding (ngModel)</h3>
    <label>
        Name: <input [(ngModel)]="nametxt" placeholder="Type your name" />
    </label>
    <label style="margin-left:12px">
        Favorite:
        <select [(ngModel)]="favorite">
            <option value="Angular">Angular</option>
            <option value="TypeScript">TypeScript</option>
            <option value="JavaScript">JavaScript</option>
        </select>
    </label>

    <p>Hello {{ nametxt || 'friend' }}!</p>
    <p>Favorite: {{ favorite }}</p>
</div>

<!-- ======================================== Attribute Binding ========================================== -->
<div class="border rounded mt-3 mb-3 p-2">
    <h3>Attribute Binding (attr.*)</h3>
    <div class="toolbar">
        <label>Colspan: <input type="range" min="1" max="3" [value]="span" (input)="span = +$any($event.target).value">
            {{
            span }}</label>
        <label>Title: <input [value]="TableTitle" (input)="TableTitle = $any($event.target).value"></label>
    </div>
    <table class="table table-bordered" [attr.title]="TableTitle">
        <thead>
            <tr>
                <th>A</th>
                <th>B</th>
                <th>C</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td [attr.colspan]="span" style="background:#f9fbff">colspan={{ span }}</td>
                <td *ngIf="span < 2">B</td>
                <td *ngIf="span < 3">C</td>
            </tr>
        </tbody>
    </table>
</div>
