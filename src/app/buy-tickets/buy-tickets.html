<div class="border rounded mt-3 mb-3 p-2">
    <form [formGroup]="buyTicketForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
            <label for="event" class="form-label">Event Name:</label>
            <input id="event" formControlName="event" class="form-control">
        </div>

        <div class="mb-3">
            <h3>Attendees</h3>
            <div formArrayName="tickets">
                <div *ngFor="let ticket of tickets.controls; let i = index" [formGroupName]="i">
                    <p>Attendee {{ i + 1 }}</p>
                    <div>
                        <label for="name-{{i}}" class="form-label">Name:</label>
                        <input id="name-{{i}}" formControlName="name" class="form-control">
                    </div>
                    <div>
                        <label for="age-{{i}}" class="form-label">Age:</label>
                        <input id="age-{{i}}" type="number" formControlName="age" class="form-control">
                    </div>
                    <button class="btn btn-danger m-3" type="button" (click)="removeTicket(i)">Remove</button>
                </div>
            </div>

            <button class="btn btn-primary" type="button" (click)="addTicket()">Add Attendee</button>&nbsp;
            <button class="btn btn-success" type="submit" [disabled]="!buyTicketForm.valid">Submit</button>
        </div>
        
        <div style="border: 1px solid gray;padding: 8px;border-radius: 10px;">
            <p>Form Status: {{ buyTicketForm.status }}</p>
            <p>Form Value: {{ buyTicketForm.value | json }}</p>
        </div>
    </form>
</div>
