<div class="border rounded mt-3 mb-3 p-2">
    <div class="text-end">
        <button #btnAddPost type="button" class="btn btn-success" data-bs-toggle="modal"
            data-bs-target="#exampleModal">Add New Post</button>
    </div>

    <ng-container *ngIf="statusMsg != ''">
        <div class="alert alert-{{alertclass}} alert-dismissible mt-3" role="alert">
            {{statusMsg}}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    </ng-container>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead>
                <tr>
                    <th scope="col">id</th>
                    <th scope="col">userId</th>
                    <th scope="col">Title</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <ng-container *ngIf="posts$ | async as posts;">
                      <tr *ngFor="let post of posts">
                        <td>{{post.id}}</td>
                        <td>{{post.userId}}</td>
                        <td>{{post.title}}</td>
                        <td>
                            <button type="button" class="btn btn-primary btn-sm"
                                (click)="editPost(post.id ?? 0)">Edit</button>&nbsp;
                            <button type="button" class="btn btn-danger btn-sm"
                                (click)="deletePost(post.id ?? 0)">Delete</button>
                        </td>
                    </tr>
                </ng-container>
            </tbody>
        </table>
    </div>
</div>

<!-- Create post modal -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="exampleModalLabel">New Post</h1>
                <button type="button" #closeModal class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form [formGroup]="postform" (ngSubmit)="onSubmit()" novalidate>
                    <div class="mb-3">
                        <label for="txtuserId" class="col-form-label">UserId:</label>
                        <input type="text" class="form-control" id="txtuserId" formControlName="userId"
                            [ngClass]="{ 'is-invalid': submitted && f['userId'].errors }">
                        <div *ngIf="submitted && f['userId'].errors" class="invalid-feedback">UserId is required.</div>
                    </div>
                    <div class="mb-3">
                        <label for="txtTitle" class="col-form-label">Title:</label>
                        <input type="text" class="form-control" id="txtTitle" formControlName="title"
                            [ngClass]="{ 'is-invalid': submitted && f['title'].errors }">
                        <div *ngIf="submitted && f['title'].errors" class="invalid-feedback">Title is required.</div>
                    </div>
                    <div class="mb-3">
                        <label for="txtBody" class="col-form-label">Body:</label>
                        <textarea class="form-control" name="txtBody" formControlName="body"
                            [ngClass]="{ 'is-invalid': submitted && f['title'].errors }"></textarea>
                        <div *ngIf="submitted && f['body'].errors" class="invalid-feedback">Body is required.</div>
                    </div>

                    <button type="submit" class="btn btn-primary">{{addUpdateBtn}}</button>&nbsp;
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" (click)="ClearFormControls()">Close</button>
                </form>
            </div>
        </div>

    </div>
</div>
